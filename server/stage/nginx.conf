server {
    listen 80;
    server_name {{STAGE_DOMAIN}};

    client_max_body_size 100M;

    # Serve static files (collected to staticfiles)
    location /static/ {
        alias {{DEPLOY_PATH}}/{{STAGE_FOLDER}}/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve media files (stored under core/media)
    location /media/ {
        alias {{DEPLOY_PATH}}/{{STAGE_FOLDER}}/core/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://unix:{{DEPLOY_PATH}}/{{STAGE_FOLDER}}/app.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }
}
